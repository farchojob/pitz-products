# PostgreSQL configuration — fully environment-driven so the same code runs
# locally (Homebrew socket), in Docker, and on a managed host (DATABASE_URL).
#
# Local Homebrew Postgres: leaving host/user/password blank connects over the
# unix socket as the current OS user, which is a superuser by default — so the
# app boots with zero configuration. Docker/CI/prod supply the vars below.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV["POSTGRES_HOST"] %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "pitz_products_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB_TEST", "pitz_products_test") %>

# On a managed host, Rails automatically reads DATABASE_URL and merges it on top
# of these values, so the explicit url below is belt-and-suspenders.
production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  database: <%= ENV.fetch("POSTGRES_DB", "pitz_products_production") %>
