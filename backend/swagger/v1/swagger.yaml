---
openapi: 3.0.1
info:
  title: PITZ Product Manager API
  version: v1
  description: CRUD API for managing products (pagination, search, filtering, validation).
servers:
- url: http://localhost:3000
  description: Local
- url: https://pitz-products-api.onrender.com
  description: Render
paths:
  "/api/v1/products":
    get:
      summary: Lists products (paginated)
      tags:
      - Products
      parameters:
      - name: page
        in: query
        required: false
        description: Page number (default 1)
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page (default 10, max 100)
        schema:
          type: integer
      - name: search
        in: query
        required: false
        description: Case-insensitive name search
        schema:
          type: string
      - name: active
        in: query
        enum:
        - 'true'
        - 'false'
        required: false
        description: "Filter by status:\n * `true` \n * `false` \n "
        schema:
          type: string
      responses:
        '200':
          description: a paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Product"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
    post:
      summary: Creates a product
      tags:
      - Products
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  "$ref": "#/components/schemas/ProductInput"
              required:
              - product
  "/api/v1/products/{id}":
    parameters:
    - name: id
      in: path
      description: Product id
      required: true
      schema:
        type: integer
    get:
      summary: Fetches a product
      tags:
      - Products
      responses:
        '200':
          description: found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    put:
      summary: Updates a product
      tags:
      - Products
      parameters: []
      responses:
        '200':
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  "$ref": "#/components/schemas/ProductInput"
    delete:
      summary: Deletes a product (soft delete)
      tags:
      - Products
      responses:
        '204':
          description: no content
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Premium Widget
        description:
          type: string
          nullable: true
        price:
          type: string
          description: Decimal serialized as a string
          example: '19.99'
        stock:
          type: integer
          example: 42
        sku:
          type: string
          example: SKU-0001
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - price
      - stock
      - sku
      - active
    ProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 1000
          nullable: true
        price:
          type: string
          description: Decimal > 0
        stock:
          type: integer
          minimum: 0
        sku:
          type: string
          description: Uppercase letters, numbers and hyphens
        active:
          type: boolean
      required:
      - name
      - price
      - stock
      - sku
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
        per_page:
          type: integer
        next:
          type: integer
          nullable: true
        prev:
          type: integer
          nullable: true
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            status:
              type: integer
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
