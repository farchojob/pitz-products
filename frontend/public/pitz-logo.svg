<svg viewBox="0 0 134 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pitz">
  <mask id="pitz-wordmark">
    <!-- white = ink, black = knockout -->
    <!-- P -->
    <rect x="2" y="3" width="13" height="42" rx="5.5" fill="#fff" />
    <rect x="2" y="3" width="30" height="23" rx="11" fill="#fff" />
    <rect x="14.5" y="10" width="8.5" height="9" rx="3" fill="#000" />
    <!-- i -->
    <circle cx="44" cy="8" r="6.5" fill="#fff" />
    <rect x="37.5" y="18" width="13" height="27" rx="5.5" fill="#fff" />
    <!-- t (angular top) -->
    <polygon points="58,45 58,10 70,4 70,45" fill="#fff" />
    <rect x="51.5" y="17.5" width="25" height="9" rx="3" fill="#fff" />
    <!-- z -->
    <rect x="85" y="18" width="39" height="10" rx="3" fill="#fff" />
    <polygon points="108,19 124,19 101,44 85,44" fill="#fff" />
    <rect x="85" y="35" width="39" height="10" rx="3" fill="#fff" />
  </mask>
  <rect width="134" height="48" fill="#F7F7F2" mask="url(#pitz-wordmark)" />
</svg>
